{% extends 'base.html' %}
{% load humanize %}

{% block content %}
<div class="d-flex flex-column align-items-center container pt-3">
    <div class="d-flex flex-row justify-content-center gap-3 flex-wrap">
        {% for product in products %}
        <div class="card" style="min-width: 18rem;">
            <img class="card-img-top" src="{{ product.image_url }}" alt="Card image cap">
            <div class="card-body">
                <h5 class="card-title">{{ product.get_title }}</h5>
                <p class="card-text">
                    {{ product.description }}
                </p>
                <p class="card-text">
                    <strong>Price:</strong> {{ product.price|floatformat:0|intcomma }}
                </p>
                <a href="#" class="btn btn-primary">Add to cart</a>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
